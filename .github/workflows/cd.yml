name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: false  # never cancel in-flight deployments

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ── Gate: quick sanity checks before deploy ─────────────
  gate:
    name: Pre-deploy Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --lib --bins

  # ── Build and Push Docker Images ────────────────────────
  docker-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [gate]
    strategy:
      matrix:
        target: [intent-trading, api-gateway, solver-bot]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.target }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          push: true
          cache-from: type=gha,scope=${{ matrix.target }}
          cache-to: type=gha,mode=max,scope=${{ matrix.target }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build and Push Frontend ─────────────────────────────
  frontend-push:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: [gate]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:latest

  # ── Database Migrations ─────────────────────────────────
  migrate:
    name: Run Migrations
    runs-on: ubuntu-latest
    needs: [docker-push]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: sqlx migrate run --source migrations

  # ── Deploy Services ─────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-push, frontend-push, migrate]
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY,IMAGE_PREFIX
          script: |
            set -euo pipefail

            cd /opt/intent-trading

            # Pull new images
            docker pull ${REGISTRY}/${IMAGE_PREFIX}/intent-trading:${IMAGE_TAG}
            docker pull ${REGISTRY}/${IMAGE_PREFIX}/api-gateway:${IMAGE_TAG}
            docker pull ${REGISTRY}/${IMAGE_PREFIX}/solver-bot:${IMAGE_TAG}
            docker pull ${REGISTRY}/${IMAGE_PREFIX}/frontend:${IMAGE_TAG}

            # Tag as deploy target
            docker tag ${REGISTRY}/${IMAGE_PREFIX}/intent-trading:${IMAGE_TAG} intent-trading:deploy
            docker tag ${REGISTRY}/${IMAGE_PREFIX}/api-gateway:${IMAGE_TAG} api-gateway:deploy
            docker tag ${REGISTRY}/${IMAGE_PREFIX}/solver-bot:${IMAGE_TAG} solver-bot:deploy
            docker tag ${REGISTRY}/${IMAGE_PREFIX}/frontend:${IMAGE_TAG} frontend:deploy

            # Save current image digests for rollback
            docker inspect --format='{{index .RepoDigests 0}}' intent-trading:deploy > /tmp/prev-intent-trading.digest 2>/dev/null || true
            docker inspect --format='{{index .RepoDigests 0}}' api-gateway:deploy > /tmp/prev-api-gateway.digest 2>/dev/null || true

            # Rolling restart: one service at a time
            docker compose up -d --no-deps intent-trading
            docker compose up -d --no-deps api-gateway
            docker compose up -d --no-deps solver-bot
            docker compose up -d --no-deps frontend

            # Wait for services to be ready
            echo "Waiting for services to become healthy..."
            sleep 5

  # ── Health Checks ───────────────────────────────────────
  health-check:
    name: Post-deploy Health Check
    runs-on: ubuntu-latest
    needs: [deploy]
    environment: production
    steps:
      - name: Check API health
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          set -euo pipefail

          MAX_RETRIES=10
          RETRY_DELAY=5

          echo "Checking health at ${DEPLOY_URL}..."

          # Liveness check
          for i in $(seq 1 $MAX_RETRIES); do
            if curl -sf --max-time 5 "${DEPLOY_URL}/health/live" > /dev/null; then
              echo "✓ Liveness check passed (attempt $i)"
              break
            fi
            if [ $i -eq $MAX_RETRIES ]; then
              echo "✗ Liveness check failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "  Retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          # Readiness check (DB + Redis + Engine)
          for i in $(seq 1 $MAX_RETRIES); do
            READY=$(curl -sf --max-time 5 "${DEPLOY_URL}/health/ready" || echo '{"status":"down"}')
            STATUS=$(echo "$READY" | jq -r '.status // "unknown"')

            if [ "$STATUS" = "ok" ]; then
              echo "✓ Readiness check passed"
              echo "  Response: $READY"
              break
            fi
            if [ $i -eq $MAX_RETRIES ]; then
              echo "✗ Readiness check failed: $READY"
              exit 1
            fi
            echo "  Not ready ($STATUS), retrying in ${RETRY_DELAY}s..."
            sleep $RETRY_DELAY
          done

          # Verify key endpoints respond
          echo "Checking endpoint availability..."

          curl -sf --max-time 5 "${DEPLOY_URL}/markets" > /dev/null \
            && echo "✓ GET /markets" \
            || { echo "✗ GET /markets failed"; exit 1; }

          curl -sf --max-time 5 "${DEPLOY_URL}/oracle/prices" > /dev/null \
            && echo "✓ GET /oracle/prices" \
            || { echo "✗ GET /oracle/prices failed"; exit 1; }

          curl -sf --max-time 5 "${DEPLOY_URL}/solvers/top?limit=1" > /dev/null \
            && echo "✓ GET /solvers/top" \
            || { echo "✗ GET /solvers/top failed"; exit 1; }

          echo ""
          echo "All health checks passed ✓"

  # ── Rollback on Failure ─────────────────────────────────
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [health-check]
    if: failure()
    environment: production
    steps:
      - name: Rollback via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail

            cd /opt/intent-trading

            echo "⚠ Health check failed — rolling back..."

            # Restore previous images if digests were saved
            if [ -f /tmp/prev-intent-trading.digest ]; then
              PREV_DIGEST=$(cat /tmp/prev-intent-trading.digest)
              echo "Rolling back intent-trading to ${PREV_DIGEST}"
              docker tag "${PREV_DIGEST}" intent-trading:deploy 2>/dev/null || true
            fi

            if [ -f /tmp/prev-api-gateway.digest ]; then
              PREV_DIGEST=$(cat /tmp/prev-api-gateway.digest)
              echo "Rolling back api-gateway to ${PREV_DIGEST}"
              docker tag "${PREV_DIGEST}" api-gateway:deploy 2>/dev/null || true
            fi

            # Restart with previous images
            docker compose up -d --no-deps intent-trading
            docker compose up -d --no-deps api-gateway
            docker compose up -d --no-deps solver-bot

            # Verify rollback health
            sleep 10
            if curl -sf --max-time 5 http://localhost:3000/health/live > /dev/null; then
              echo "✓ Rollback successful — service is live"
            else
              echo "✗ CRITICAL: Rollback also failed. Manual intervention required."
              exit 1
            fi

      - name: Notify rollback
        if: always()
        run: |
          echo "::error::Deployment failed and was rolled back. Check the health-check job for details."
          echo "Commit: ${{ github.sha }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
