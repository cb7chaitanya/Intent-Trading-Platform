services:
  # --------------- Infrastructure ---------------
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intent_trading
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/backup/wal-archive.sh:/scripts/wal-archive.sh:ro
    command:
      - "postgres"
      - "-c"
      - "archive_mode=on"
      - "-c"
      - "archive_command=/scripts/wal-archive.sh %p %f"
      - "-c"
      - "archive_timeout=60"
      - "-c"
      - "wal_level=replica"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --------------- TLS Termination ---------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/ssl:/etc/nginx/ssl:ro
      - certbot-webroot:/var/www/certbot:ro
    depends_on:
      - api-gateway
      - frontend
      - intent-trading
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  # Let's Encrypt certificate renewal (production only)
  certbot:
    image: certbot/certbot
    volumes:
      - ./infra/nginx/ssl:/etc/letsencrypt
      - certbot-webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    profiles:
      - production

  # --------------- Backend Services ---------------
  intent-trading:
    build:
      context: .
      target: intent-trading
    # No host port — accessed through nginx
    expose:
      - "3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/intent_trading
      REDIS_URL: redis://redis:6379
      SERVER_ADDR: 0.0.0.0:3000
      JWT_SECRET: docker-dev-secret-change-in-prod
      LOG_LEVEL: info
      ENVIRONMENT: docker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  api-gateway:
    build:
      context: .
      target: api-gateway
    # No host port — accessed through nginx
    expose:
      - "4000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/intent_trading
      REDIS_URL: redis://redis:6379
      GATEWAY_ADDR: 0.0.0.0:4000
      UPSTREAM_URL: http://intent-trading:3000
      JWT_SECRET: docker-dev-secret-change-in-prod
      LOG_LEVEL: info
      ENVIRONMENT: docker
    depends_on:
      intent-trading:
        condition: service_healthy

  solver-bot:
    build:
      context: .
      target: solver-bot
    environment:
      SERVER_URL: http://intent-trading:3000
      WS_URL: ws://intent-trading:3000/ws/feed
    depends_on:
      intent-trading:
        condition: service_healthy
    restart: on-failure

  # --------------- Frontend ---------------
  frontend:
    build:
      context: ./frontend
    expose:
      - "3001"
    environment:
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: wss://localhost/ws/feed
    depends_on:
      - api-gateway

  # --------------- Monitoring ---------------
  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infra/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
    depends_on:
      - intent-trading

  loki:
    image: grafana/loki:3.0.0
    ports:
      - "3100:3100"
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/local-config.yaml

  promtail:
    image: grafana/promtail:3.0.0
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/dashboard.json
    volumes:
      - ./infra/grafana/dashboard.json:/var/lib/grafana/dashboards/dashboard.json
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
      - loki

  # --------------- Load Testing (on-demand) ---------------
  load-test:
    build:
      context: .
      target: load-test
    environment:
      BASE_URL: http://intent-trading:3000
      WS_URL: ws://intent-trading:3000/ws/feed
    depends_on:
      intent-trading:
        condition: service_healthy
    profiles:
      - testing

  # --------------- Backup ---------------
  pg-backup:
    build:
      context: ./infra/backup
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: intent_trading
      S3_BUCKET: intentx-backups
      S3_ENDPOINT: http://minio:9000
      S3_PREFIX: daily
      RETENTION_DAYS: "30"
      WAL_RETENTION_DAYS: "7"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      PUSHGATEWAY_URL: ""
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - production

volumes:
  pgdata:
  certbot-webroot:
  loki-data:
