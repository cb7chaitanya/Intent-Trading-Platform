global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "intent-trading"
    static_configs:
      - targets: ["host.docker.internal:3000"]
        labels:
          service: "platform"

  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:4000"]
        labels:
          service: "gateway"
