global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "intent-trading"
    static_configs:
      - targets: ["intent-trading:3000"]
        labels:
          service: "platform"

  - job_name: "api-gateway"
    static_configs:
      - targets: ["api-gateway:4000"]
        labels:
          service: "gateway"
